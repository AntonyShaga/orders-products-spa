name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "~/temp-deploy"

      - name: Setup ENV + deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if [ "${{ github.ref_name }}" = "staging" ]; then
              APP_DIR=~/orders-products-staging
            else
              APP_DIR=~/orders-products-spa
            fi

            mkdir -p $APP_DIR
            cp -r ~/temp-deploy/* $APP_DIR/

            cd $APP_DIR

            # backend env
            echo "${{ secrets.BACKEND_ENV }}" > backend/.env

            # frontend env
            echo "${{ secrets.FRONTEND_ENV }}" > frontend/.env

            docker-compose down || true

            if [ "${{ github.ref_name }}" = "staging" ]; then
              sed -i 's/80:80/81:80/' docker-compose.yml
            fi

            docker-compose up -d --build