name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Run tests
        run: |
          cd frontend
          npm run test

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Clean temp deploy folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf ~/temp-deploy

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "~/temp-deploy"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if [ "${{ github.ref_name }}" = "staging" ]; then
              APP_DIR=~/orders-products-staging
              PROJECT_NAME=staging
              BACK_ENV="${{ secrets.BACKEND_ENV_STAGING }}"
              FRONT_ENV="${{ secrets.FRONTEND_ENV_STAGING }}"
            else
              APP_DIR=~/orders-products-spa
              PROJECT_NAME=prod
              BACK_ENV="${{ secrets.BACKEND_ENV_PROD }}"
              FRONT_ENV="${{ secrets.FRONTEND_ENV_PROD }}"
            fi

            mkdir -p $APP_DIR

            rsync -av --delete ~/temp-deploy/ $APP_DIR/

            cd $APP_DIR

            echo "$BACK_ENV" > backend/.env
            echo "$FRONT_ENV" > frontend/.env

            docker-compose -p $PROJECT_NAME stop frontend backend nginx || true
            docker-compose -p $PROJECT_NAME rm -f frontend backend nginx || true

            if [ "$PROJECT_NAME" = "staging" ]; then
              sed -i 's/80:80/81:80/' docker-compose.yml
            fi

            docker-compose -p $PROJECT_NAME build --no-cache frontend
            docker-compose -p $PROJECT_NAME up -d frontend backend nginx